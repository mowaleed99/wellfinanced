<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Financial Entry - Freelance Finance AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-fixed-dim": "#dcb8ff",
                      "on-tertiary-fixed": "#380d00",
                      "on-primary-container": "#efefff",
                      "error-container": "#93000a",
                      "on-tertiary": "#5b1a00",
                      "error": "#ffb4ab",
                      "surface-container-highest": "#33343e",
                      "outline-variant": "#434656",
                      "on-secondary-container": "#dcb7ff",
                      "surface-container": "#1d1f29",
                      "on-surface": "#e2e1ef",
                      "primary": "#b8c3ff",
                      "inverse-primary": "#124af0",
                      "tertiary-fixed-dim": "#ffb59b",
                      "surface-container-low": "#191b24",
                      "surface-tint": "#b8c3ff",
                      "secondary-container": "#7701d0",
                      "primary-container": "#2e5bff",
                      "on-surface-variant": "#c4c5d9",
                      "on-tertiary-container": "#ffece6",
                      "surface": "#11131c",
                      "on-error-container": "#ffdad6",
                      "on-background": "#e2e1ef",
                      "inverse-on-surface": "#2e303a",
                      "primary-fixed-dim": "#b8c3ff",
                      "tertiary": "#ffb59b",
                      "surface-bright": "#373943",
                      "surface-dim": "#11131c",
                      "on-primary-fixed-variant": "#0035be",
                      "secondary-fixed": "#efdbff",
                      "on-secondary-fixed-variant": "#6700b5",
                      "on-primary-fixed": "#001356",
                      "primary-fixed": "#dde1ff",
                      "on-secondary": "#480081",
                      "on-error": "#690005",
                      "secondary": "#dcb8ff",
                      "surface-variant": "#33343e",
                      "inverse-surface": "#e2e1ef",
                      "tertiary-fixed": "#ffdbcf",
                      "on-tertiary-fixed-variant": "#812800",
                      "tertiary-container": "#c24100",
                      "surface-container-high": "#282933",
                      "outline": "#8e90a2",
                      "surface-container-lowest": "#0c0e17",
                      "on-secondary-fixed": "#2c0051",
                      "on-primary": "#002388",
                      "background": "#11131c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "12px",
                      "container-padding": "20px",
                      "unit": "4px",
                      "stack-md": "16px",
                      "stack-sm": "8px",
                      "stack-lg": "24px"
              },
              "fontFamily": {
                      "display-lg": ["Inter"],
                      "body-base": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-md": ["Inter"],
                      "data-mono": ["Space Grotesk"]
              },
              "fontSize": {
                      "display-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-base": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "data-mono": ["18px", {"lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "500"}]
              }
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .glass-card {
            background: rgba(29, 31, 41, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .inner-glow-blue {
            box-shadow: inset 0 0 12px rgba(46, 91, 255, 0.25);
        }
        .rim-light {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-base pb-32">
<!-- TopAppBar -->
<nav class="bg-slate-950/80 backdrop-blur-xl border-b border-white/10 shadow-2xl shadow-blue-900/20 fixed top-0 w-full z-50 flex justify-between items-center h-16 w-full px-6">
<div class="active:scale-95 duration-200 p-2 rounded-full hover:bg-white/5 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-blue-500 dark:text-blue-400">arrow_back</span>
</div>
<h1 class="font-inter antialiased tracking-tight font-semibold text-on-surface">New Entry</h1>
<div class="active:scale-95 duration-200 p-2 rounded-full hover:bg-white/5 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-blue-500 dark:text-blue-400">check</span>
</div>
</nav>
<main class="mt-20 px-container-padding space-y-8">
<!-- AI Bookkeeper Card -->
<div class="relative overflow-hidden glass-card rounded-xl p-4 flex gap-4 items-center group">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 to-transparent pointer-events-none"></div>
<div class="h-12 w-12 rounded-full bg-primary-container flex items-center justify-center shadow-lg shadow-primary-container/30 ring-2 ring-white/10">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div class="flex-1">
<p class="text-label-sm font-label-sm text-primary-fixed-dim uppercase tracking-widest mb-1">AI Bookkeeper</p>
<p class="text-[13px] leading-snug text-on-surface-variant font-medium">I'll categorize this automatically for your tax report.</p>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[80px]">neurology</span>
</div>
</div>
<!-- Segmented Control -->
<div class="bg-surface-container-low p-1 rounded-xl flex gap-1 border border-white/5 h-12">
<button class="flex-1 py-2.5 rounded-lg text-label-sm font-label-sm transition-all duration-300 bg-primary-container text-white shadow-lg shadow-primary-container/20 inner-glow-blue">INCOME</button>
<button class="flex-1 py-2.5 rounded-lg text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">EXPENSE</button>
<button class="flex-1 py-2.5 rounded-lg text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">DEBT</button>
</div>
<!-- Amount Input Section -->
<div class="space-y-stack-sm text-center py-4"><span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">ENTER AMOUNT</span>
<div class="relative inline-flex items-baseline justify-center mt-2">
<span class="text-display-lg text-[56px] text-primary-fixed-dim mr-2 opacity-50">$</span>
<input class="bg-transparent border-none focus:ring-0 text-center font-display-lg text-[64px] w-48 text-on-surface font-bold placeholder-on-surface/20 p-0" type="text" value="0.00"/>
<div class="absolute -bottom-2 left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-40"></div>
</div></div>
<!-- Source Name Field -->
<div class="space-y-stack-sm">
<label class="text-label-sm font-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">work</span>
                Source name
            </label>
<div class="relative group">
<input class="w-full bg-surface-container border border-outline-variant/50 rounded-xl px-4 py-4 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder-on-surface-variant/40 shadow-inner" placeholder="e.g. Acme Corp Contract" type="text"/>
</div>
</div>
<!-- Date & Status Row -->
<div class="grid grid-cols-2 gap-stack-md"><div class="space-y-2">
<label class="text-label-sm font-label-sm text-on-surface-variant ml-1">Date</label>
<div class="bg-surface-container border border-outline-variant/50 rounded-xl px-4 py-4 flex items-center justify-between text-on-surface cursor-pointer group hover:border-primary/50 transition-colors h-[58px]">
<span class="text-sm font-medium">May 24, 2024</span>
<span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-on-surface-variant ml-1">Status</label>
<div class="bg-surface-container border border-outline-variant/50 rounded-xl px-4 py-4 flex items-center justify-between text-on-surface cursor-pointer group hover:border-primary/50 transition-colors h-[58px]">
<span class="text-sm font-medium">Received</span>
<span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors">expand_more</span>
</div>
</div></div>
<!-- AI Suggestions -->
<div class="space-y-stack-sm">
<div class="flex items-center justify-between">
<label class="text-label-sm font-label-sm text-on-surface-variant">AI Suggestions</label>
<span class="material-symbols-outlined text-primary-fixed-dim text-[16px] animate-pulse">auto_awesome</span>
</div>
<div class="flex flex-wrap gap-2"><button class="px-5 py-2.5 rounded-full bg-surface-container-high border border-primary-container/20 text-on-primary-container text-[13px] font-semibold hover:bg-primary-container/20 transition-all active:scale-95">Development</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low border border-outline-variant/30 text-on-surface-variant text-[13px] font-semibold hover:border-primary-container/50 transition-all active:scale-95">UI Design</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low border border-outline-variant/30 text-on-surface-variant text-[13px] font-semibold hover:border-primary-container/50 transition-all active:scale-95">Consulting</button></div>
</div>
<!-- Note Field -->
<div class="space-y-stack-sm">
<label class="text-label-sm font-label-sm text-on-surface-variant">Note (Optional)</label>
<textarea class="w-full bg-surface-container border border-outline-variant/50 rounded-xl px-4 py-4 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder-on-surface-variant/40 resize-none" placeholder="Add additional details or project milestones..." rows="3"></textarea>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-container hover:bg-inverse-primary text-white font-bold py-4.5 rounded-xl shadow-xl shadow-primary-container/30 transition-all active:scale-[0.98] flex items-center justify-center gap-3 group text-lg">
<span>Save Transaction</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-slate-950/90 backdrop-blur-2xl border-t border-white/10 rounded-t-2xl shadow-[0_-8px_30px_rgba(0,0,0,0.5)] z-50 flex justify-around items-center pt-3 pb-6 px-4">
<!-- Dashboard -->
<div class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-blue-300 transition-all active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest">Dashboard</span>
</div>
<!-- Ledger (Active) -->
<div class="flex flex-col items-center justify-center bg-blue-600/20 text-blue-400 rounded-xl px-4 py-1.5 shadow-[inset_0_0_12px_rgba(46,91,255,0.2)] border border-blue-500/30 active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest text-blue-400 font-bold">Ledger</span>
</div>
<!-- Insights -->
<div class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-blue-300 transition-all active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1">query_stats</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest">Insights</span>
</div>
<!-- Settings -->
<div class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-blue-300 transition-all active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest">Settings</span>
</div>
</nav>
<!-- Decorative Elements -->
<div class="fixed top-1/4 -right-20 w-64 h-64 bg-primary-container/10 blur-[100px] pointer-events-none rounded-full"></div>
<div class="fixed bottom-1/4 -left-20 w-64 h-64 bg-secondary-container/10 blur-[100px] pointer-events-none rounded-full"></div>
</body></html>

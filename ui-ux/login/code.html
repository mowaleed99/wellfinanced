<style>
        .glass-card {
            background: rgba(29, 31, 41, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .rim-light {
            box-shadow: inset 1px 1px 0px 0px rgba(255, 255, 255, 0.1);
        }
        .primary-glow {
            box-shadow: 0 0 20px rgba(46, 91, 255, 0.3);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(46, 91, 255, 0.15) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(194, 65, 0, 0.1) 0, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-base min-h-screen flex items-center justify-center p-container-padding overflow-hidden bg-mesh">
<!-- Decorative AI Neural Mesh Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<div class="relative w-full max-w-[420px] z-10">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mb-stack-md primary-glow rim-light">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="bubble_chart">bubble_chart</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tighter">FinAI</h1>
<p class="font-body-base text-body-base text-on-surface-variant/80 mt-1">Intelligence for the modern freelancer</p>
</div>
<!-- Login Card -->
<div class="glass-card p-stack-lg rounded-[2rem] rim-light">
<div class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome back</h2>
<p class="font-body-base text-body-base text-on-surface-variant">Log in to your financial partner</p>
</div>
<form class="space-y-stack-md">
<!-- Email Input -->
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline uppercase tracking-widest ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-white/5 rounded-2xl text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner font-body-base text-body-base" id="email" placeholder="name@freelance.ai" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-outline uppercase tracking-widest" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock_open">lock_open</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-lowest border border-white/5 rounded-2xl text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner font-body-base text-body-base" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-2xl primary-glow rim-light active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-stack-md" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login / Secondary Action -->
<div class="mt-stack-lg pt-stack-lg border-t border-white/5">
<div class="text-center">
<p class="font-body-base text-body-base text-on-surface-variant/60 mb-stack-md">Don't have an account?</p>
<button class="w-full border border-white/10 bg-white/5 hover:bg-white/10 py-3 rounded-xl font-label-sm text-label-sm text-on-surface uppercase tracking-widest transition-all active:scale-[0.99]">
                        Sign Up Now
                    </button>
</div>
</div>
</div>
<!-- AI Assistant Preview (Minimal) -->
<div class="mt-stack-lg flex items-center justify-center gap-gutter px-container-padding">
<div class="relative">
<div class="w-12 h-12 rounded-full overflow-hidden border border-white/20">
<img alt="AI Interface Avatar" class="w-full h-full object-cover" data-alt="high-gloss 3D abstract orb with neural mesh pattern glowing in blue and purple tones against a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCKiG_8uUM7ina1lViPfL6J-4nmCDgVbh8JZABx1yY6XSYvOPFiqAXqv5fmdgEQVT42ubSIVvFbLpousbBD7vCIiB6dBaK1I4gVk9vdtRirOtK7Ihy1VS8sopwn_r4-ow3eiHFGIi9OXvC2ke63xRxqY08V7-7nnlagapuIHeE66gxYsNL-PmP5DnTSq1D1pXKn5TkX1xy99zsOclJ5j0nl4Er4IzGduITHqN0lVQpS5gXaoI0LtrMrpY6ECElJf90bOMK7VVKYln-"/>
</div>
<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-background rounded-full"></div>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant font-bold">FinAI Assistant</p>
<p class="font-label-sm text-[10px] text-outline uppercase tracking-wider">Ready to optimize your cashflow</p>
</div>
</div>
</div>
<!-- Decorative visual in the corner -->
<div class="fixed bottom-0 right-0 opacity-20 pointer-events-none translate-x-1/4 translate-y-1/4">
<div class="w-[600px] h-[600px] rounded-full border-[1px] border-primary-container/30"></div>
<div class="absolute inset-0 w-[500px] h-[500px] m-auto rounded-full border-[1px] border-primary-container/20"></div>
<div class="absolute inset-0 w-[400px] h-[400px] m-auto rounded-full border-[1px] border-primary-container/10"></div>
</div>
</body></html>

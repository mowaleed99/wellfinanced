<style>
        .glass-card {
            background: rgba(29, 31, 41, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .inner-glow-btn {
            box-shadow: 0 0 20px rgba(46, 91, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

            background: rgba(12, 14, 23, 0.8);

        }

            background-image:

<body class="bg-background text-on-background font-body-base min-h-screen mesh-bg selection:bg-primary/30">
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-container-padding py-stack-lg">
<!-- Branding Header -->
<header class="mb-stack-lg flex flex-col items-center text-center">
<div class="w-16 h-16 mb-stack-md rounded-2xl bg-gradient-to-br from-primary-container to-secondary-container flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-4xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
</div>
<h1 class="font-display-lg text-display-lg tracking-tighter text-white mb-stack-sm">
                FinAI <span class="text-primary-fixed-dim">Cyber Freelance</span>
</h1>
<p class="font-body-base text-on-surface-variant max-w-xs">
                Empower your financial future with high-performance AI insights.
            </p>
</header>
<!-- Sign Up Card -->
<div class="glass-card w-full max-w-md rounded-3xl p-stack-lg overflow-hidden relative">
<!-- Decorative Light Sweep -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="relative z-10">
<h2 class="font-headline-md text-headline-md text-white mb-stack-lg">Create Account</h2>
<form class="space-y-stack-md">
<!-- Full Name Field -->
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="name">NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="recessed-input w-full pl-12 pr-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-primary/50 text-white placeholder:text-outline/50 transition-all" id="name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">alternate_email</span>
<input class="recessed-input w-full pl-12 pr-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-primary/50 text-white placeholder:text-outline/50 transition-all" id="email" placeholder="email@cyberfreelance.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="recessed-input w-full pl-12 pr-12 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-primary/50 text-white placeholder:text-outline/50 transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 pt-stack-sm">
<div class="mt-1">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-low text-primary focus:ring-offset-background focus:ring-primary" id="terms" type="checkbox"/>
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-snug" for="terms">
                            I agree to the <a class="text-primary hover:underline transition-all" href="#">Terms &amp; Conditions</a> and <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>
</label>
</div>
<!-- Primary Action Button -->
<button class="inner-glow-btn w-full bg-primary-container hover:bg-inverse-primary text-on-primary-container font-headline-md text-body-base py-4 rounded-xl transition-all active:scale-[0.98] mt-stack-md flex items-center justify-center gap-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-stack-lg">
<div class="h-px bg-white/10 flex-grow"></div>
<span class="font-label-sm text-label-sm text-outline">OR REGISTER WITH</span>
<div class="h-px bg-white/10 flex-grow"></div>
</div>
<!-- OAuth Options -->
<div class="grid grid-cols-2 gap-stack-md mb-stack-lg">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google logo icon on a white circle background minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOgwpiN4kCAWrK4gjXPJs4Dxsrb14YIPNYp6PKf65FayxiVYIdJleGPtToZ9Ibfa_JqJkjRFCa4Cqnc2L3ikks4FkgwYruq5bUgzwFbTKa_xJgd8hRZxpgL3dwBg-Ax4iuEESBi_DZ4_nChsXK_VZli2DNQkpCuWbI6xau7ekznebv-5plMc189AzOXb7yzQMU0ZjGBBL9iOrP-zx4nBJEbyh9UL0Bxu1I_Ot0Nyo21tdIE9rL1hiGpVWg3Mgt7ftmLSa_LlFqzjz9"/>
<span class="font-label-sm text-label-sm text-white">GOOGLE</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-white text-[20px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="font-label-sm text-label-sm text-white">GITHUB</span>
</button>
</div>
<!-- Secondary Action -->
<footer class="text-center">
<p class="font-body-base text-label-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-bold hover:text-primary-fixed-dim transition-colors ml-1" href="#">Log In</a>
</p>
</footer>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed top-0 right-0 p-stack-lg opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-primary/40 rotate-12">monitoring</span>
</div>
<div class="fixed bottom-0 left-0 p-stack-lg opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[100px] text-secondary/40 -rotate-12">security</span>
</div>
</main>
<!-- Background Illustration Blur -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] pointer-events-none -z-10">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
